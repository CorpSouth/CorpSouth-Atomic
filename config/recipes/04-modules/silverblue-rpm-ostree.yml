type: rpm-ostree
repos:
  - https://copr.fedorainfracloud.org/coprs/dusansimic/themes/repo/fedora-40/dusansimic-themes-fedora-40.repo
  - https://copr.fedorainfracloud.org/coprs/ublue-os/staging/repo/fedora-%OS_VERSION%/ublue-os-staging-fedora-%OS_VERSION%.repo
install:
  - adw-gtk3-theme
  - dconf-editor
  - gnome-shell-extension-appindicator
  - gnome-shell-extension-gsconnect
  - gnome-shell-extension-user-themes
  - gnome-tweaks
  - nautilus-gsconnect
  - nautilus-open-any-terminal
  - nautilus-python
remove:
  - gnome-classic-session
  # BEGIN removing default extensions
  - gnome-shell-extension-apps-menu
  - gnome-shell-extension-background-logo
  - gnome-shell-extension-launch-new-instance
  - gnome-shell-extension-places-menu
  - gnome-shell-extension-window-list
  # END removing default extensions
  - gnome-terminal
  - gnome-terminal-nautilus
  - gnome-tour
  - yelp
